rules:
  # ---------------------------------------------------------------
  # Port Scan Detection (cross-flow)
  # ---------------------------------------------------------------
  - name: "Port Scan"
    enabled: true
    severity: "High"
    logic: "all"
    conditions:
      - field: "cross_unique_dst_ports"
        op: "gte"
        value: 20
    description: >-
      A single device tried to connect to {cross_unique_dst_ports} different
      ports in the last 30 seconds — this usually means someone is scanning
      the network to find open services they can exploit.

  # ---------------------------------------------------------------
  # SYN Flood (cross-flow)
  # ---------------------------------------------------------------
  - name: "DoS SYN Flood"
    enabled: true
    severity: "Critical"
    logic: "all"
    conditions:
      - field: "cross_syn_ratio"
        op: "gte"
        value: 0.8
      - field: "cross_pps"
        op: "gte"
        value: 100
    description: >-
      {cross_syn_ratio:.0%} of packets from this source are connection-request
      (SYN) packets at {cross_pps:.0f} packets/sec across {cross_flow_count}
      flows — this looks like a denial-of-service attack flooding the target
      with fake connection attempts.

  # ---------------------------------------------------------------
  # Generic Volumetric Flood (High packets-per-second rate)
  # ---------------------------------------------------------------
  - name: "Volumetric Flood (PPS)"
    enabled: true
    severity: "Medium"
    logic: "all"
    conditions:
      - field: "cross_pps"
        op: "gte"
        value: 500
      - field: "cross_total_packets"
        op: "gte"
        value: 100
    description: >-
      High packet rate detected: {cross_pps:.0f} packets/sec across {cross_flow_count} flows (total {cross_total_packets} packets).

  # ---------------------------------------------------------------
  # Generic Volumetric Flood (High bandwidth usage)
  # ---------------------------------------------------------------
  - name: "Volumetric Flood (Bps)"
    enabled: true
    severity: "Medium"
    logic: "all"
    conditions:
      - field: "cross_bps"
        op: "gte"
        value: 200000
      - field: "cross_total_bytes"
        op: "gte"
        value: 1000000
    description: >-
      High bandwidth usage detected: {cross_bps:.1f} bytes/sec across {cross_flow_count} flows (total {cross_total_bytes} bytes).

  # ---------------------------------------------------------------
  # Generic Volumetric Flood (Distributed/Cross-flow high packet rate)
  # ---------------------------------------------------------------
  - name: "Volumetric Flood (Cross-Flow)"
    enabled: true
    severity: "Medium"
    logic: "all"
    conditions:
      - field: "cross_pps"
        op: "gte"
        value: 500
      - field: "cross_flow_count"
        op: "gte"
        value: 20
    description: >-
      High cross-flow packet rate detected: {cross_pps:.0f} packets/sec across {cross_flow_count} flows.

  # ---------------------------------------------------------------
  # UDP Flood
  # ---------------------------------------------------------------
  - name: "UDP Flood"
    enabled: true
    severity: "High"
    logic: "all"
    conditions:
      - field: "protocol"
        op: "eq"
        value: "UDP"
      - field: "cross_pps"
        op: "gte"
        value: 300
      - field: "cross_flow_count"
        op: "gte"
        value: 20
    description: >-
      A burst of {cross_pps:.0f} UDP packets/sec across {cross_flow_count} flows was detected.
      UDP floods are commonly used in denial-of-service attacks because
      UDP does not require a connection handshake, making it easy to
      forge and amplify.

  # ---------------------------------------------------------------
  # DNS Amplification Attack
  # ---------------------------------------------------------------
  - name: "DNS Amplification"
    enabled: true
    severity: "Critical"
    logic: "all"
    conditions:
      - field: "protocol"
        op: "eq"
        value: "UDP"
      - field: "dst_port"
        op: "eq"
        value: 53
      - field: "cross_pps"
        op: "gte"
        value: 100
      - field: "cross_flow_count"
        op: "gte"
        value: 10
      - field: "avg_packet_size"
        op: "lte"
        value: 100
    description: >-
      High-rate small DNS packets detected (avg {avg_packet_size:.0f} bytes at
      {cross_pps:.0f}/sec across {cross_flow_count} flows). Attackers often abuse public DNS servers to
      amplify traffic toward a victim — the small request generates a much
      larger response.

  # ---------------------------------------------------------------
  # Suspicious Long-Lived Connection
  # ---------------------------------------------------------------
  - name: "Suspicious Long Flow"
    enabled: true
    severity: "Medium"
    logic: "all"
    conditions:
      - field: "duration"
        op: "gte"
        value: 300
      - field: "packet_count"
        op: "gte"
        value: 100
    description: >-
      A connection has been active for {duration:.0f} seconds with
      {packet_count} packets. Most normal connections are short-lived — a
      long-running flow may indicate a hidden tunnel, a persistent backdoor,
      or an attacker maintaining access to the network.

  # ---------------------------------------------------------------
  # Command-and-Control Beaconing
  # ---------------------------------------------------------------
  - name: "C2 Beacon"
    enabled: true
    severity: "Critical"
    logic: "all"
    conditions:
      - field: "direction"
        op: "eq"
        value: "outbound"
      - field: "duration"
        op: "gte"
        value: 300
      - field: "packets_per_second"
        op: "lte"
        value: 1
      - field: "packet_count"
        op: "gte"
        value: 50
    description: >-
      A device on your network has been sending a slow, steady trickle of
      outbound traffic for {duration:.0f} seconds ({packets_per_second:.2f}
      packets/sec). This "heartbeat" pattern is how malware checks in with
      its command server — the low rate is designed to avoid detection.

  # ---------------------------------------------------------------
  # Data Exfiltration (Large Outbound Transfer)
  # ---------------------------------------------------------------
  - name: "Data Exfiltration"
    enabled: true
    severity: "High"
    logic: "all"
    conditions:
      - field: "direction"
        op: "eq"
        value: "outbound"
      - field: "byte_count"
        op: "gte"
        value: 10000000
      - field: "duration"
        op: "gte"
        value: 60
    description: >-
      A device sent {byte_count} bytes outbound over {duration:.0f} seconds.
      Large sustained outbound transfers can indicate that sensitive data is
      being stolen from your network — especially if this device does not
      normally upload large files.

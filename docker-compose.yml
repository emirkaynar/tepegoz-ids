services:
    influxdb:
        image: influxdb:2.7-alpine
        container_name: influxdb
        ports:
            - "8086:8086"
        environment:
            - DOCKER_INFLUXDB_INIT_MODE=setup
            - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_USER:-admin}
            - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_PASSWORD:-password123}
            - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG:-tepegoz}
            - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET:-ids_data}
            - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN}
        volumes:
            - influxdb_data:/var/lib/influxdb2
        networks:
            - ids-network

    grafana:
        image: grafana/grafana-oss:latest
        container_name: grafana
        ports:
            - "3000:3000"
        environment:
            - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
            - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
            - INFLUXDB_URL=http://influxdb:8086
            - INFLUXDB_ORG=${INFLUXDB_ORG:-tepegoz}
            - INFLUXDB_BUCKET=${INFLUXDB_BUCKET:-ids_data}
            - INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
        volumes:
            - grafana_data:/var/lib/grafana
            - ./grafana/provisioning:/etc/grafana/provisioning
            - ./grafana/dashboards:/var/lib/grafana/dashboards
        depends_on:
            - influxdb
        networks:
            - ids-network

    engine:
        build: ./engine
        container_name: ids-engine
        cap_add:
            - NET_ADMIN
        network_mode: host
        environment:
            - INFLUXDB_URL=http://localhost:8086
            - INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
            - INFLUXDB_ORG=${INFLUXDB_ORG:-tepegoz}
            - INFLUXDB_BUCKET=${INFLUXDB_BUCKET:-ids_data}
            - APP_ENV=development
            - AUTO_DETECT_CONTAINER_NETS=${AUTO_DETECT_CONTAINER_NETS:-true}
            - EXCLUDE_NETS=${EXCLUDE_NETS:-}
            - SUPPRESS_EXCLUDED_INTERNAL=${SUPPRESS_EXCLUDED_INTERNAL:-true}
        depends_on:
            - influxdb
        restart: always

networks:
    ids-network:
        driver: bridge

volumes:
    influxdb_data:
    grafana_data:
